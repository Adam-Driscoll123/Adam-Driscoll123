<!DOCTYPE html>

  <body>
    <div class="task13a-flexbox">
      <div class="left-side">
        <div class="high-contrast">item1</div>

    <div class="task13a-flexbox">
      <div class="left-side"></div>
      <div class="right-side">
        <div class="task13b-row1">

            <div class="high-contrast">row2</div>

            Biggest sales of the year!
          </div>
          <div class="email-body">

        </div>

      </div>
