<!DOCTYPE html>
<html>
  <head>
    <title>Nested Flexbox</title>
    <link rel="stylesheet" href="styles/nestedflexbox.css">
    <link rel="stylesheet" href="styles/gmail.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="task13a-flexbox">
      <div class="left-side">
        <div class="high-contrast">item1</div>
      </div>
      <div class="right-side"></div>
    </div>

    <div class="task13a-flexbox">
      <div class="left-side"></div>
      <div class="right-side">
        <div class="task13b-row1">
          row1
          <div class="task13b-row2">
            <div class="high-contrast">row2</div>
            <div class="high-contrast">row2</div>
          </div>
        </div>
      </div>
    </div>

    
    <div class="gmail">
      <div class="inboxes">ALL INBOXES</div>

      <div class="email-container">
        <div class="pfp-container">
          <img class="picture" src="pictures\cat.png">
        </div>

        <div class="email-info">
          <div class="email-sender">
            <div class="sender-name">Chewy Promotions</div>
            <div class="timestamp">4:58 PM</div>
          </div>
          <div class="email-subject">
            Biggest sales of the year!
          </div>
          <div class="email-body">
            Hey there! We're writing to tell you about our...
          </div>
        </div>

      </div>
    </div>

  </body>
</html>
