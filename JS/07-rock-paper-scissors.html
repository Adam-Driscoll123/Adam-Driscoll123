<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
  </head>

  <body>
    <p>Rock Paper Scissors</p>

    <button 
    onclick="
      computerGuess();
      checkWinner('Rocks', computerMove);

    ">Rock</button>
    
    <button 
    onclick="
      computerGuess();
      checkWinner('Paper', computerMove);
      
    ">Paper</button>

    <button 
    onclick="
      computerGuess();
      checkWinner('Scissors', computerMove);

    ">Scissors</button>
    <button
    onclick="
      score.Wins=0;
      score.Losses=0;
      score.Ties=0;">Reset score</button>

    <script>
      let computerMove = '';
      let result = '';
      const score = {
        Wins: 0,
        Losses: 0,
        Ties: 0
      }
      
      console.log(localStorage.getItem('score'));

      function computerGuess(){
        let randomNumber = Math.random();

        if (randomNumber<=1/3){
          computerMove ='Rock';
        }
        else if (randomNumber>2/3){
          computerMove = 'Scissors';
        }
        else{
          computerMove = 'Paper';
        }
        return computerMove;
      }

      function checkWinner(playerGuess, computerMove){
        console.log(`Player chose ${playerGuess} and computer chose ${computerMove}`);
        if (playerGuess === computerMove){
          result = 'tie.';
        }
        else if (playerGuess === 'Rock'){
          result = (computerMove==='Scissors') ? 'win!' : 'lose.';
        }
        else if (playerGuess === 'Paper'){
          result = (computerMove==='Rock') ? 'win!' : 'lose.';
        }
        else if (playerGuess === 'Scissors'){
          result = (computerMove==='Paper') ? 'win!' : 'lose.';
        }
        if (result==='win!'){
          score.Wins++;
        }
        else if (result==='lose.'){
          score.Losses++;
        }
        else{
          score.Ties++;
        }

        
        localStorage.setItem('score', JSON.stringify(score));
        return alert(`You picked ${playerGuess} and computer picked ${computerMove}. You ${result} 
        Score: Wins: ${score.Wins}, Losses: ${score.Losses}, Ties: ${score.Ties}`);
        
      }
    </script>
  </body>

  
</html>
