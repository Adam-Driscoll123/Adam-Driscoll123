  <button class="JS-button">Second button</button>
  <button class="ninea">9a</button>
  <button class="nineb" onclick="nineb();">9b</button>

  <p></p>
  <button class="heads" onclick="coinFlip('heads');">heads</button>
  <button class="tails" onclick="coinFlip('tails');">tails</button>
  <p class="coinflip-choice"></p>

  <input placeholder="Enter name" class="name-box" onkeydown="isKeyEnter(event);">
  <button class="submit-button" onclick="displayName();">Submit</button>
  <p class="name-display"></p>

    //Challenges
    console.log(document.querySelector('.ninea'));
    function nineb(){
      const buttonElement = document.querySelector('.nineb');
      if (buttonElement.innerHTML === '9b'){
        buttonElement.innerHTML = '9b done!';
      }
      else {
        buttonElement.innerHTML = '9b';
      }
    }

    function coinFlip(choice){
      document.querySelector('.coinflip-choice').innerHTML = `You chose: ${choice}`;
    }
    
    function displayName(){
      inputElement = document.querySelector('.name-box').value;

      if (inputElement){
        document.querySelector('.name-display').innerHTML = `Your name is: ${inputElement}`;
      }
    }
    function isKeyEnter(event){
      if (event.key === 'Enter'){
        displayName();
      }
    }
  </script>
