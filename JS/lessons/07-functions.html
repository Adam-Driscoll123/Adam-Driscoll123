      //Length conversions
      function convertLength(length, from, to){
        if (from!=='miles'&&from!=='km'&&from!=='ft'){
          return `Invalid value ${from}`
        }
        if (to!=='miles'&&to!=='km'&&to!=='ft'){
          return `Invalid value ${to}`
        }
        else if (from===to){
          return length;
        }
        else if (from==="km"){
          if (to==="miles"){
            length/=1.6;
          }
          else if (to==="ft"){
            length*=3281;
          }
        }
        else if (from==="ft"){
          if (to==="miles"){
            length/=5280;
          }
          else if (to==="km"){
            length/=3281;
          }
        }
        else if (from==="miles"){
          if (to==="km"){
            length*=1.6;
          }
          else if (to==="ft"){
            length*=5280;
          }
        }
        return length;
      }
      console.log(convertLength(50, 'miles', 'km'));
      console.log(convertLength(32, 'km', 'miles'));
      console.log(convertLength(50, 'km', 'km'));
      console.log(convertLength(5, 'miles', 'km'));
      console.log(convertLength(5, 'miles', 'ft'));
      console.log(convertLength(5, 'km', 'ft'));
      console.log(convertLength(5, 'km', 'lbs'));
