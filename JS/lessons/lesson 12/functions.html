      //Challenges
      let messages = 0;
      document.querySelector('.js-add-button').addEventListener('click', () => { adjustMessages(1); });
      document.querySelector('.js-remove-button').addEventListener('click', () => { adjustMessages(-1); });

      function start(){
        let startElement = document.querySelector('.js-start-button');
        startElement.innerHTML = 'Loading...';
        setTimeout(function (){
          startElement.innerHTML = 'Finished!';
        }, 1000);
        
      }
      let timeoutID;
      function addToCart(){
        clearTimeout(timeoutID);
        let outputElement = document.querySelector('.js-output');
        outputElement.innerHTML = 'Added';
        timeoutID = setTimeout(function() {
          outputElement.innerHTML = '';
        }, 2000);

      }
      
      
      setInterval(function(){
        if (document.title === 'App' && messages>0){
          document.title = `(${messages}) New Messages`;
        }
        else{
          document.title = `App`;
        }
      }, 1500);

      function adjustMessages(number){
        if ((messages+number)<0){
          messages=0;
          return;
        }
        messages+=number;
      }
