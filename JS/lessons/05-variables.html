<!DOCTYPE html>
<html>
  <head>
    <title>Variables</title>
  </head>


  <body>
    <p>Cart Quantity</p>
    <button
      onclick="console.log(productCount)">
      Show Quantity
    </button>
    <button
      onclick="addToCart(+1)
               ">Add to Cart
    </button>
    <button 
      onclick="addToCart(+2)
                  ">+2
    </button>
    <button 
      onclick="addToCart(+3)">+3
    </button>
    <button 
      onclick="addToCart(-1)">Remove from Cart
    </button>
    <button 
      onclick="addToCart(-2)">-2
    </button>
    <button 
      onclick="addToCart(-3)">-3
    </button>
    <button onclick="productCount = 0;
                     updateItemQuantity();">Reset
    </button>
    <p class="cart-quantity"></p>
    
    <script>
      let productCount = localStorage.getItem('quantity') || 0;
      const cartElement = document.querySelector('.cart-quantity');
      updateItemQuantity();
      

      function addToCart(quantity){
        if(isValidQuantity(quantity)){
            productCount+=quantity;
        }
        updateItemQuantity();
      }

      function isValidQuantity(items){
        //Check if items above 10
        if (productCount+items>10){
          console.log("Too many items")
          return false;
        }
        //Check if items below 0
        else if (productCount+items<0){
          console.log("Not enough items in cart")
          return false;
        }
        return true;
      }

      function updateItemQuantity(){
        localStorage.setItem('quantity', productCount);
        cartElement.innerHTML = `Cart Quantity: ${productCount}`;
      }

      
      
      
      

      
    </script>

  </body>
</html>
