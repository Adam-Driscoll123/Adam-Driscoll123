<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rps.css">
  </head>

  <body>
    <p>Rock Paper Scissors</p>
    
    <button 
      data-move="rock"
      class="move-button js-rock-button js-move-button">
      <img class="move-image" src="media/rock.png">
    </button>
    
    <button 
      data-move="paper"
      class="move-button js-paper-button js-move-button">
      <img class="move-image" src="media/paper.png">
    </button>

    <button
      data-move="scissors"
      class="move-button js-scissors-button js-move-button">
      <img class="move-image" src="media/scissors.png">
    </button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button
      class="reset-button js-reset-button">
      Reset score
    </button>

    <button 
      class="auto-play-button js-auto-play-button">
      Auto Play
    </button>

    <div class="message-container js-message-container">
      <h3 class="message">Are you sure you want to reset the score?</h3>
      <div>
        <button class="yes-button js-yes-button">Yes</button>
        <button class="no-button js-no-button">No</button>
      </div>
      

    </div>

    <script src="rps.js">
      
    </script>
  </body>

  
</html>
