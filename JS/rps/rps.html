<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rps.css">
  </head>

  <body>
    <p>Rock Paper Scissors</p>
    
    <button 
      class="move-button"
      onclick="
        computerGuess();
        checkWinner('rock', computerMove);
      ">
      <img class="move-image" src="media/rock.png">
    </button>
    
    <button 
      class="move-button"
      onclick="
        computerGuess();
        checkWinner('paper', computerMove);
      ">
      <img class="move-image" src="media/paper.png">
    </button>

    <button 
      class="move-button"
      onclick="
        computerGuess();
        checkWinner('scissors', computerMove);
      ">
      <img class="move-image" src="media/scissors.png">
    </button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button
      class="reset-button"
      onclick="
        score.Wins=0;
        score.Losses=0;
        score.Ties=0;
        localStorage.removeItem('score');
        updateScoreElement();
    ">Reset score</button>

    <script src="rps.js">
      
    </script>
  </body>

  
</html>
