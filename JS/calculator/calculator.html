<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
  </head>

  <body>
    <div class="calculator-body">
      <div class="js-calculation calculation-display">0</div>

      <div>
        <button 
          class="grey-button" 
          onclick="console.log(updateCalculation('7'));">
          7
        </button>

        <button 
          class="grey-button" 
          onclick="console.log(updateCalculation('8'));">
          8
        </button>

        <button 
          class="grey-button"  
          onclick="console.log(updateCalculation('9'));">
          9
        </button>
        <button 
          class="orange-button"
          onclick="console.log(updateCalculation(' + '));">
          +
        </button>
      </div>

      <div>
        <button 
          class="grey-button" 
          onclick="console.log(updateCalculation('4'));">
          4
        </button>

        <button 
          class="grey-button"
          onclick="console.log(updateCalculation('5'));">
          5
        </button>

        <button
          class="grey-button" 
          onclick="console.log(updateCalculation('6'));">
          6
        </button>
        <button 
          class="orange-button"
          onclick="console.log(updateCalculation(' - '));">
          -
        </button>
      </div>
      <div>
        <button 
          class="grey-button" 
          onclick="console.log(updateCalculation('1'));">
          1
        </button>

        <button 
          class="grey-button" 
          onclick="console.log(updateCalculation('2'));">
          2
        </button>

        <button
          class="grey-button"  
          onclick="console.log(updateCalculation('3'));">
          3
        </button>
        <button 
          class="orange-button"
          onclick="console.log(updateCalculation(' * '));">
          *
        </button>
        
      </div>
      
      <div>
        <button 
          class="grey-button"
          onclick="console.log(updateCalculation('0'));">
          0
        </button>
        <button 
          class="grey-button"
          onclick="console.log(updateCalculation('.'));">
          .
        </button>
        <button 
          class="grey-button" 
          onclick="evaluateCalculation();">
          =
        </button>
        <button 
          class="orange-button"
          onclick="console.log(updateCalculation(' / '));"
          >
          /
        </button>
      
      </div>

      <div>
        <button 
          class="grey-button" 
          onclick="clearCalculation();">
          CLR
        </button>
      </div>
    </div>
    
    
  


  </body>

  <script src="calculator.js">
    
  </script>
</html>
