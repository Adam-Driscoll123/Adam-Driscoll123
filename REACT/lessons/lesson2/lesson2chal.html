<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function Product ({ name, price, discountPrice, imageSrc }){
        return (
          <>
            <div>
              <p>{name}</p>
              <img src={imageSrc} width="50" />
              {!discountPrice ? <p>Price: {price}</p> : <del><p>Price: {price}</p></del> }
              { discountPrice && <p>Discount price: {discountPrice}</p> }
            </div>
            
            <button>Add to Cart</button>
          </>
        );
      }

      function App ({ name, price }) {
        return (
          <>
            <Product 
              name="Cotton socks" 
              price="$10.90" 
              discountPrice="$5.45"
              imageSrc = "images/cotton-socks.png"/>
            <Product 
              name="Tennis balls" 
              price="$6.00" 
              discountPrice="$5.45"
              imageSrc = "images/tennis-balls.png"/>
            <Product 
              name="Plain T-Shirt" 
              price="$7.99"
              imageSrc = "images/plain-t-shirt.png"/>
            
          </>
        );
      }
      
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
